<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youcef Mekki - Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon-blue:#00d4ff; --neon-purple:#8844ff; --neon-red:#ff2d4d; }
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Rajdhani','Segoe UI',sans-serif; }
        html { scroll-snap-type:y proximity; }
        body { background:#000; color:#fff; scroll-behavior:smooth; overflow-x:hidden; }

        #robot-canvas { position:fixed; top:0; left:0; width:100%; height:100%; z-index:0; pointer-events:none; }

        .section { height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center; position:relative; padding:20px; z-index:1; scroll-snap-align:start; }
        .section::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.45); z-index:-1; }

        .btn { width:250px; padding:15px; margin:10px; border-radius:15px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.06); cursor:pointer; color:white; font-weight:700; font-size:1rem; letter-spacing:0.5px; backdrop-filter:blur(12px); transition:0.3s; }
        .btn:hover { background:rgba(0,212,255,0.18); transform:translateY(-5px); border-color:var(--neon-blue); }
        .btn-download:hover { background:rgba(255,45,77,0.18); border-color:var(--neon-red); box-shadow:0 0 18px rgba(255,45,77,0.35); }

        /* ازرار السوشيال بلوغو */
        .btn-social { display:flex; align-items:center; gap:14px; text-align:left; padding-left:20px; }
        .btn-social .s-icon { width:28px; height:28px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
        .btn-social .s-icon svg { width:100%; height:100%; }
        .btn-social span.lbl { flex:1; }

        .profile-img { width:140px; height:140px; border-radius:50%; border:3px solid var(--neon-blue); box-shadow:0 0 25px var(--neon-blue),0 0 8px rgba(255,45,77,0.5); margin-bottom:14px; object-fit:cover; background-color:#333; }

        #home { justify-content:flex-start; padding-top:9vh; }
        #home::before { background:rgba(0,0,0,0.25); }
        #home h1 { text-shadow:0 0 20px var(--neon-blue),0 0 40px #00d4ff55; margin-bottom:6px; font-family:'Orbitron','Rajdhani',sans-serif; font-size:1.8rem; letter-spacing:1px; }
        #home .tagline { color:var(--neon-red); font-weight:600; letter-spacing:2px; text-transform:uppercase; font-size:0.8rem; margin-bottom:26px; opacity:0.9; }

        .lang-box { position:fixed; top:20px; left:20px; z-index:1000; display:flex; flex-direction:column; gap:5px; }
        .arrow { cursor:pointer; background:rgba(0,0,0,0.6); border:1px solid #00d4ff44; padding:5px 10px; border-radius:5px; backdrop-filter:blur(8px); transition:0.25s; }
        .arrow:hover { border-color:var(--neon-red); box-shadow:0 0 10px rgba(255,45,77,0.4); }

        h2 { margin-bottom:14px; font-size:1.6rem; font-family:'Orbitron','Rajdhani',sans-serif; text-shadow:0 0 15px #00d4ff88; letter-spacing:1px; }
        h2::after { content:''; display:block; width:50px; height:3px; margin:12px auto 22px; background:var(--neon-red); box-shadow:0 0 10px var(--neon-red); border-radius:2px; }

        @media (max-width:600px) { .btn { width:85vw; } #home h1 { font-size:1.4rem; } #home { padding-top:7vh; } .profile-img { width:110px; height:110px; } }
    </style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ==================== اللغات ====================
const data = {
    en: { name:"Youcef Mekki", tagline:"Full-Stack Developer", bioTitle:"About Me",   bioText:"Full-stack developer and Cybersecurity enthusiast. Born 31/08/2008. Passionate about building secure systems.", social:"Social Networks", works:"My Works" },
    ar: { name:"يوسف مكي",    tagline:"مطور تطبيقات ومواقع", bioTitle:"من أنا",      bioText:"مطور تطبيقات ومواقع، شغوف بالأمن السيبراني. مواليد 31/08/2008. أسعى دائماً لابتكار حلول تقنية آمنة.",       social:"حسابات التواصل", works:"أعمالي" },
    fr: { name:"Youcef Mekki", tagline:"Développeur Full-Stack", bioTitle:"À propos", bioText:"Développeur full-stack et passionné de cybersécurité. Né le 31/08/2008. Engagé dans la création d'applications sécurisées.", social:"Réseaux Sociaux", works:"Mes Projets" }
};
let langs=['en','ar','fr'], langIdx=0;
function updateUI(){
    const l=langs[langIdx];
    document.getElementById('lang-display').innerText=l.toUpperCase();
    document.getElementById('name').innerText=data[l].name;
    document.getElementById('tagline').innerText=data[l].tagline;
    document.getElementById('bio-title').innerText=data[l].bioTitle;
    document.getElementById('bio-text').innerText=data[l].bioText;
    document.getElementById('social-title').innerText=data[l].social;
    document.getElementById('works-title').innerText=data[l].works;
    document.documentElement.dir = l==='ar' ? 'rtl' : 'ltr';
}
function nextLang(){ langIdx=(langIdx+1)%langs.length; updateUI(); }
function prevLang(){ langIdx=(langIdx-1+langs.length)%langs.length; updateUI(); }
updateUI();

// ==================== Three.js ====================
const canvas = document.getElementById('robot-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, alpha:true, antialias:true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
const scene  = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 1.2, 6);

scene.add(new THREE.AmbientLight(0x111133, 2.5));
const blueLight = new THREE.PointLight(0x00d4ff, 4, 22);
blueLight.position.set(-3, 3, 3); scene.add(blueLight);
const purpleLight = new THREE.PointLight(0x8844ff, 2.5, 18);
purpleLight.position.set(3, 2, -2); scene.add(purpleLight);
const rimLight = new THREE.DirectionalLight(0x00ffcc, 1.2);
rimLight.position.set(0, 5, -5); scene.add(rimLight);
const redLight = new THREE.PointLight(0xff2d4d, 1.8, 14);
redLight.position.set(0, -1, 3); scene.add(redLight);

const metalMat   = new THREE.MeshStandardMaterial({ color:0x1a1a2e, metalness:0.9, roughness:0.2 });
const glowMat    = new THREE.MeshStandardMaterial({ color:0x00d4ff, emissive:0x00d4ff, emissiveIntensity:1.8, metalness:0.3, roughness:0.1 });
const darkMat    = new THREE.MeshStandardMaterial({ color:0x0d0d1a, metalness:0.8, roughness:0.3 });
const eyeMat     = new THREE.MeshStandardMaterial({ color:0x00ffff, emissive:0x00ffff, emissiveIntensity:3 });
const accentMat  = new THREE.MeshStandardMaterial({ color:0x8844ff, emissive:0x8844ff, emissiveIntensity:1.2, metalness:0.5, roughness:0.2 });
const redCoreMat = new THREE.MeshStandardMaterial({ color:0xff2d4d, emissive:0xff2d4d, emissiveIntensity:2.2, metalness:0.4, roughness:0.15 });

function box(w,h,d,mat,x,y,z){ const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); return m; }
function cyl(rt,rb,h,seg,mat,x,y,z,rx=0,ry=0,rz=0){ const m=new THREE.Mesh(new THREE.CylinderGeometry(rt,rb,h,seg),mat); m.position.set(x,y,z); m.rotation.set(rx,ry,rz); return m; }
function sph(r,mat,x,y,z){ const m=new THREE.Mesh(new THREE.SphereGeometry(r,16,16),mat); m.position.set(x,y,z); return m; }

const robotGroup = new THREE.Group();
scene.add(robotGroup);
robotGroup.position.set(0, -0.3, 0);

robotGroup.add(box(1.2,1.4,0.7,metalMat,0,0,0));
robotGroup.add(box(1.22,0.05,0.72,glowMat,0,0.4,0));
robotGroup.add(box(1.22,0.05,0.72,glowMat,0,-0.4,0));
robotGroup.add(box(0.05,1.42,0.72,accentMat,0.55,0,0));
robotGroup.add(box(0.05,1.42,0.72,accentMat,-0.55,0,0));
robotGroup.add(box(0.6,0.5,0.1,darkMat,0,0.1,0.36));
robotGroup.add(sph(0.08,glowMat,0.15,0.15,0.44));
robotGroup.add(sph(0.08,glowMat,-0.15,0.15,0.44));
robotGroup.add(sph(0.07,redCoreMat,0,-0.05,0.46));
robotGroup.add(cyl(0.18,0.22,0.25,12,darkMat,0,0.82,0));
robotGroup.add(cyl(0.2,0.2,0.05,12,glowMat,0,0.95,0));
robotGroup.add(box(0.9,0.8,0.8,metalMat,0,1.45,0));
robotGroup.add(box(0.92,0.05,0.82,glowMat,0,1.82,0));
robotGroup.add(box(0.92,0.05,0.82,glowMat,0,1.08,0));
robotGroup.add(box(0.1,0.4,0.3,darkMat,0.5,1.45,0));
robotGroup.add(box(0.1,0.4,0.3,darkMat,-0.5,1.45,0));
robotGroup.add(cyl(0.06,0.06,0.15,8,glowMat,0.56,1.45,0,0,0,Math.PI/2));
robotGroup.add(cyl(0.06,0.06,0.15,8,glowMat,-0.56,1.45,0,0,0,Math.PI/2));
const eyeL=box(0.18,0.1,0.05,eyeMat,0.22,1.5,0.41);
const eyeR=box(0.18,0.1,0.05,eyeMat,-0.22,1.5,0.41);
robotGroup.add(eyeL,eyeR);
robotGroup.add(box(0.35,0.04,0.05,glowMat,0,1.22,0.41));
robotGroup.add(box(0.04,0.04,0.05,glowMat,0.1,1.22,0.41));
robotGroup.add(box(0.04,0.04,0.05,glowMat,-0.1,1.22,0.41));
robotGroup.add(cyl(0.03,0.03,0.4,8,darkMat,0.25,2.05,0));
robotGroup.add(sph(0.07,glowMat,0.25,2.27,0));

const leftArm=new THREE.Group();  leftArm.position.set(0.75,0.2,0);
const rightArm=new THREE.Group(); rightArm.position.set(-0.75,0.2,0);
function buildArm(g){
    g.add(cyl(0.18,0.18,0.15,12,accentMat,0,0,0,0,0,Math.PI/2));
    const upper=new THREE.Group(); upper.position.set(0,-0.1,0);
    upper.add(box(0.28,0.7,0.28,metalMat,0,-0.35,0));
    upper.add(box(0.3,0.05,0.3,glowMat,0,0,0));
    upper.add(box(0.3,0.05,0.3,glowMat,0,-0.7,0));
    g.add(upper);
    g.add(cyl(0.16,0.16,0.1,12,darkMat,0,-0.75,0));
    g.add(cyl(0.18,0.18,0.05,12,glowMat,0,-0.78,0));
    const lower=new THREE.Group(); lower.position.set(0,-0.85,0);
    lower.add(box(0.24,0.65,0.24,metalMat,0,-0.32,0));
    lower.add(box(0.26,0.04,0.26,accentMat,0,-0.65,0));
    g.add(lower);
    g.add(box(0.22,0.18,0.16,darkMat,0,-1.55,0));
    for(let i=-1;i<=1;i++) g.add(box(0.05,0.12,0.06,metalMat,i*0.07,-1.7,0.04));
}
buildArm(leftArm); buildArm(rightArm);
robotGroup.add(leftArm,rightArm);

function buildLeg(x){
    const g=new THREE.Group(); g.position.set(x,-0.7,0);
    g.add(cyl(0.2,0.2,0.15,12,accentMat,0,0,0));
    g.add(box(0.32,0.8,0.32,metalMat,0,-0.47,0));
    g.add(box(0.34,0.05,0.34,glowMat,0,-0.08,0));
    g.add(box(0.34,0.05,0.34,glowMat,0,-0.85,0));
    g.add(cyl(0.18,0.18,0.12,12,darkMat,0,-0.95,0));
    g.add(box(0.3,0.7,0.3,metalMat,0,-1.32,0));
    g.add(box(0.32,0.05,0.32,accentMat,0,-1.65,0));
    g.add(box(0.35,0.14,0.5,metalMat,0,-1.77,0.08));
    g.add(box(0.37,0.04,0.52,glowMat,0,-1.82,0.08));
    return g;
}
robotGroup.add(buildLeg(0.32),buildLeg(-0.32));

const pGeo=new THREE.BufferGeometry();
const pPos=new Float32Array(400*3);
for(let i=0;i<pPos.length;i++) pPos[i]=(Math.random()-0.5)*22;
pGeo.setAttribute('position',new THREE.BufferAttribute(pPos,3));
const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x00d4ff,size:0.04,transparent:true,opacity:0.45}));
scene.add(particles);

const grid=new THREE.GridHelper(24,24,0x00d4ff,0x0a0a1a);
grid.position.y=-2.5; grid.material.opacity=0.25; grid.material.transparent=true;
scene.add(grid);

const ring1=new THREE.Mesh(new THREE.TorusGeometry(2,0.02,8,80),new THREE.MeshStandardMaterial({color:0x00d4ff,emissive:0x00d4ff,emissiveIntensity:0.6}));
ring1.rotation.x=Math.PI/2; scene.add(ring1);
const ring2=new THREE.Mesh(new THREE.TorusGeometry(1.5,0.015,8,60),new THREE.MeshStandardMaterial({color:0x8844ff,emissive:0x8844ff,emissiveIntensity:0.6}));
ring2.rotation.x=1.2; ring2.rotation.z=0.5; scene.add(ring2);

let touchX=0, touchY=0;
document.addEventListener('touchmove',(e)=>{ e.preventDefault(); const t=e.touches[0]; touchX=(t.clientX/window.innerWidth-0.5)*2; touchY=(t.clientY/window.innerHeight-0.5)*2; },{passive:false});
document.addEventListener('touchstart',(e)=>{ const t=e.touches[0]; touchX=(t.clientX/window.innerWidth-0.5)*2; touchY=(t.clientY/window.innerHeight-0.5)*2; });
document.addEventListener('mousemove',(e)=>{ touchX=(e.clientX/window.innerWidth-0.5)*2; touchY=(e.clientY/window.innerHeight-0.5)*2; });

let t=0;
function animate(){
    requestAnimationFrame(animate); t+=0.012;
    robotGroup.position.y=-0.3+Math.sin(t*0.8)*0.12;
    robotGroup.rotation.y+=(touchX*0.6-robotGroup.rotation.y)*0.06;
    robotGroup.rotation.x+=(-touchY*0.25-robotGroup.rotation.x)*0.06;
    leftArm.rotation.x=Math.sin(t)*0.25-0.3;
    rightArm.rotation.x=-Math.sin(t)*0.25-0.3;
    leftArm.rotation.z=0.15+Math.sin(t*0.7)*0.05;
    rightArm.rotation.z=-0.15-Math.sin(t*0.7)*0.05;
    eyeMat.emissiveIntensity=2+Math.sin(t*3);
    redCoreMat.emissiveIntensity=1.8+Math.sin(t*2.2)*0.8;
    blueLight.intensity=3+Math.sin(t*2)*0.8;
    blueLight.position.x=Math.sin(t*0.5)*4;
    ring1.rotation.z+=0.005; ring2.rotation.y+=0.008;
    ring1.position.copy(robotGroup.position);
    ring2.position.copy(robotGroup.position);
    particles.rotation.y+=0.0003;
    camera.position.x+=(touchX*0.4-camera.position.x)*0.02;
    camera.position.y+=(-touchY*0.25+1.2-camera.position.y)*0.02;
    camera.lookAt(0,0.8,0);
    renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{ renderer.setSize(window.innerWidth,window.innerHeight); camera.aspect=window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); });
</script>
</body>
</html>
