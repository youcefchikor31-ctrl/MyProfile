<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Youcef Mekki - Portfolio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; transition: 0.4s; }
        body { background: #000; color: #fff; scroll-behavior: smooth; overflow-x: hidden; }
        
        .section { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; padding: 20px; }
        
        /* الخلفيات */
        #home { background: radial-gradient(circle, #1b2735 0%, #000 100%); }
        #bio { background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); }
        #social { background: linear-gradient(135deg, #004e92, #000428); }
        #works { background: linear-gradient(135deg, #141e30, #243b55); }

        /* الأزرار */
        .btn { width: 250px; padding: 15px; margin: 10px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); cursor: pointer; color: white; font-weight: bold; backdrop-filter: blur(10px); }
        .btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-5px); border-color: #00d4ff; }

        /* تعديلات الصورة الاحترافية */
        .profile-img { 
            width: 160px; 
            height: 160px; 
            border-radius: 50%; 
            border: 4px solid #00d4ff; 
            box-shadow: 0 0 20px #00d4ff; 
            margin-bottom: 20px; 
            object-fit: cover; /* لضمان عدم تشوه الصورة */
            background-color: #333; /* لون احتياطي في حال تأخر تحميل الصورة */
        }

        .lang-box { position: fixed; top: 20px; left: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 5px; }
        .arrow { cursor: pointer; background: #333; padding: 5px 10px; border-radius: 5px; }
    </style>
</head>
<body>

<div class="lang-box">
    <div class="arrow" onclick="nextLang()">▲</div>
    <div id="lang-display" style="text-align: center; font-weight: bold;">EN</div>
    <div class="arrow" onclick="prevLang()">▼</div>
</div>

<section id="home" class="section">
    <img src="myphoto.jpg" alt="Youcef Mekki" class="profile-img">
    <h1 id="name">Youcef Mekki</h1>
    <button class="btn" onclick="document.getElementById('bio').scrollIntoView()">About Me</button>
    <button class="btn" onclick="document.getElementById('social').scrollIntoView()">Social Links</button>
    <button class="btn" onclick="document.getElementById('works').scrollIntoView()">My Works</button>
</section>

<section id="bio" class="section">
    <h2 id="bio-title">About Me</h2>
    <p id="bio-text" style="max-width: 600px; text-align: center; line-height: 1.8;">
        Full-stack developer and Cybersecurity enthusiast. Passionate about building secure systems.
    </p>
    <button class="btn" onclick="document.getElementById('home').scrollIntoView()">Back</button>
</section>

<section id="social" class="section">
    <h2 id="social-title">Social Networks</h2>
    <button class="btn" onclick="window.open('https://www.instagram.com/chikor_youcef_31')">Instagram</button>
    <button class="btn" onclick="window.open('https://t.me/213796514353')">Telegram</button>
    <button class="btn" onclick="window.open('https://wa.me/213796514353')">WhatsApp</button>
    <button class="btn" onclick="window.open('https://www.snapchat.com/add/youcef_chikor31?share_id=yy-mF2Xu720&locale=en-AU')">Snapchat</button>
    <button class="btn" onclick="document.getElementById('home').scrollIntoView()">Back</button>
</section>

<section id="works" class="section">
    <h2 id="works-title">My Works</h2>
    <button class="btn" onclick="window.open('https://www.mediafire.com/file/kaxz2skfbqb6n1p/WiFi_Fixer_Pro_1.0_sign.apk/file')">WiFi Fixer Pro</button>
    <button class="btn" onclick="window.open('https://www.mediafire.com/file/edn5t2jxe3h2l4w/Yuch_Vault_1.0.apk/file')">Yuch Vault</button>
    <button class="btn" onclick="document.getElementById('home').scrollIntoView()">Back</button>
</section>

<script>
    const data = {
        en: { name: "Youcef Mekki", bioTitle: "About Me", bioText: "Full-stack developer and Cybersecurity enthusiast. Born 31/08/2008. Passionate about building secure systems.", social: "Social Networks", works: "My Works", back: "Back" },
        ar: { name: "يوسف مكي", bioTitle: "من أنا", bioText: "مطور تطبيقات ومواقع، شغوف بالأمن السيبراني. مواليد 31/08/2008. أسعى دائماً لابتكار حلول تقنية آمنة.", social: "حسابات التواصل", works: "أعمالي", back: "رجوع" },
        fr: { name: "Youcef Mekki", bioTitle: "À propos", bioText: "Développeur full-stack et passionné de cybersécurité. Né le 31/08/2008. Engagé dans la création d'applications sécurisées.", social: "Réseaux Sociaux", works: "Mes Projets", back: "Retour" }
    };

    let langs = ['en', 'ar', 'fr'];
    let index = 0;

    function updateUI() {
        let lang = langs[index];
        document.getElementById('lang-display').innerText = lang.toUpperCase();
        document.getElementById('name').innerText = data[lang].name;
        document.getElementById('bio-title').innerText = data[lang].bioTitle;
        document.getElementById('bio-text').innerText = data[lang].bioText;
        document.getElementById('social-title').innerText = data[lang].social;
        document.getElementById('works-title').innerText = data[lang].works;
    }

    function nextLang() { index = (index + 1) % langs.length; updateUI(); }
    function prevLang() { index = (index - 1 + langs.length) % langs.length; updateUI(); }
</script>
</body>
</html>
